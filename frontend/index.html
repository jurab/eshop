<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>eshop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f4;
      color: #1c1917;
      padding: 2rem;
    }
    h1 { margin-bottom: 1.5rem; }
    #status { color: #78716c; margin-bottom: 1rem; }
    #products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }
    .card {
      background: #fff;
      border: 1px solid #e7e5e4;
      border-radius: 8px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }
    .card h2 { font-size: 1.1rem; }
    .card .desc { color: #57534e; font-size: .9rem; flex: 1; }
    .card .price { font-weight: 700; font-size: 1.2rem; }
    .card .stock { font-size: .8rem; color: #78716c; }
    .card .stock.out { color: #dc2626; }
  </style>
</head>
<body>
  <h1>eshop</h1>
  <p id="status">loading…</p>
  <div id="products"></div>
  <script src="app.js"></script>
</body>
</html>
